<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Offsync AI - Offline Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: #0f0f1a;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: bold;
        }
        
        .logo span {
            color: #7c3aed;
        }
        
        .status {
            font-size: 11px;
            background: #2ed57320;
            padding: 5px 10px;
            border-radius: 20px;
            color: #2ed573;
        }
        
        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
        }
        
        .message.bot {
            align-self: flex-start;
        }
        
        .message-content {
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 14px;
        }
        
        .message.user .message-content {
            background: #7c3aed;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.bot .message-content {
            background: #2a2a3a;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        /* Input Area */
        .input-area {
            padding: 16px 20px;
            background: #0f0f1a;
            border-top: 1px solid #2a2a3a;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: #7c3aed;
        }
        
        .input-area button {
            padding: 12px 20px;
            background: #7c3aed;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .input-area button:active {
            background: #6d28d9;
        }
        
        /* Menu Buttons */
        .menu-bar {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #0f0f1a;
            border-top: 1px solid #2a2a3a;
        }
        
        .menu-btn {
            flex: 1;
            padding: 8px;
            background: #2a2a3a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
        }
        
        .menu-btn.active {
            background: #7c3aed;
            color: white;
        }
        
        /* Sidebar para sa history */
        .sidebar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #0f0f1a;
            z-index: 100;
            flex-direction: column;
            padding: 20px;
        }
        
        .sidebar.open {
            display: flex;
        }
        
        .sidebar h3 {
            margin-bottom: 15px;
            color: #7c3aed;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 10px;
            background: #2a2a3a;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .chat-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .close-sidebar {
            background: #e94560;
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            margin-top: 10px;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        
        .typing {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h3>📜 Chat History</h3>
        <div class="chat-list" id="chatList">
            <div style="color: #888; text-align:center;">No saved chats</div>
        </div>
        <button class="close-sidebar" onclick="closeSidebar()">Close</button>
    </div>

    <div class="header">
        <div class="logo">Offsync<span>AI</span></div>
        <div class="status" id="statusText">✅ Online</div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message bot">
            <div class="message-content">👋 Hello! Welcome to <strong>Offsync AI</strong>!<br><br>
            ✅ 100% Offline - No internet needed<br>
            🔒 Private - Chats stay on your device<br>
            💬 Just type your message below!<br><br>
            <strong>Ask me anything!</strong></div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button id="sendBtn">Send</button>
    </div>

    <div class="menu-bar">
        <button class="menu-btn" id="historyBtn">📜 History</button>
        <button class="menu-btn" id="clearBtn">🗑️ Clear</button>
        <button class="menu-btn" id="themeBtn">🌙 Dark</button>
    </div>

    <script>
        // Variables
        let currentConversationId = Date.now();
        let isDark = true;
        
        // Load saved data
        function loadConversations() {
            const saved = localStorage.getItem('offsync_chats');
            if (saved) {
                return JSON.parse(saved);
            }
            return [];
        }
        
        function saveConversations(conversations) {
            localStorage.setItem('offsync_chats', JSON.stringify(conversations));
            updateChatList();
        }
        
        function saveCurrentConversation() {
            const messages = [];
            document.querySelectorAll('#messagesContainer .message').forEach(msg => {
                const isBot = msg.classList.contains('bot');
                const content = msg.querySelector('.message-content')?.innerText;
                if (content && !content.includes('👋 Hello')) {
                    messages.push({
                        role: isBot ? 'assistant' : 'user',
                        content: content
                    });
                }
            });
            
            if (messages.length === 0) return;
            
            let conversations = loadConversations();
            const title = messages[0]?.content.substring(0, 40) || 'New Chat';
            
            const existingIndex = conversations.findIndex(c => c.id === currentConversationId);
            if (existingIndex !== -1) {
                conversations[existingIndex] = {
                    id: currentConversationId,
                    title: title,
                    messages: messages,
                    date: new Date().toISOString()
                };
            } else {
                conversations.unshift({
                    id: currentConversationId,
                    title: title,
                    messages: messages,
                    date: new Date().toISOString()
                });
            }
            
            saveConversations(conversations);
        }
        
        function updateChatList() {
            const conversations = loadConversations();
            const chatListDiv = document.getElementById('chatList');
            
            if (conversations.length === 0) {
                chatListDiv.innerHTML = '<div style="color: #888; text-align:center;">No saved chats</div>';
                return;
            }
            
            chatListDiv.innerHTML = conversations.map(conv => `
                <div class="chat-item" onclick="loadConversation(${conv.id})">
                    <div class="chat-title">${escapeHtml(conv.title)}</div>
                    <div style="font-size:10px; color:#888;">${new Date(conv.date).toLocaleDateString()}</div>
                </div>
            `).join('');
        }
        
        window.loadConversation = function(id) {
            const conversations = loadConversations();
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                currentConversationId = conv.id;
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                conv.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                    div.innerHTML = `<div class="message-content">${escapeHtml(msg.content)}</div>`;
                    container.appendChild(div);
                });
                scrollToBottom();
                closeSidebar();
            }
        };
        
        function newConversation() {
            currentConversationId = Date.now();
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            addBotMessage("✨ Started a new conversation! Ask me anything!");
        }
        
        // AI Responses (Keyword-based, 100% offline)
        function getAIResponse(message) {
            const msg = message.toLowerCase().trim();
            
            const responses = {
                'hello': "👋 Hello! How can I help you today?",
                'hi': "Hi there! Great to chat with you!",
                'hey': "Hey! What's on your mind?",
                'how are you': "I'm doing great! Ready to assist you offline!",
                'what is your name': "I'm Offsync AI - your offline private chatbot!",
                'name': "I'm Offsync AI!",
                'help': "📖 I can help with:\n• Answering questions\n• Chatting with you\n• Saving conversations\n• Exporting chats\n• Working completely offline!\n\nJust type anything you want to talk about!",
                'what can you do': "I can chat with you, answer questions, save your conversations, and everything runs 100% offline on your device. Your privacy is guaranteed!",
                'offline': "Yes! I work completely offline. No internet connection needed at all. All AI responses are generated locally on your device!",
                'privacy': "🔒 Your privacy is my priority! All your chats stay only on this device. No data is ever sent to any server. Everything is 100% private!",
                'thanks': "You're very welcome! 😊 Happy to help!",
                'thank you': "You're welcome! Anytime!",
                'bye': "Goodbye! Come back anytime! 👋",
                'goodbye': "See you later! Take care! 👋"
            };
            
            for (let [key, response] of Object.entries(responses)) {
                if (msg.includes(key)) {
                    return response;
                }
            }
            
            // Default response
            return `💬 Thanks for your message: "${message.substring(0, 100)}"\n\nI'm running 100% offline on your device. Your chats are private and never leave your phone. What else would you like to talk about?`;
        }
        
        // Message handlers
        function addUserMessage(text) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            container.appendChild(div);
            scrollToBottom();
            saveCurrentConversation();
        }
        
        function addBotMessage(text) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message bot';
            let formatted = escapeHtml(text).replace(/\n/g, '<br>');
            div.innerHTML = `<div class="message-content">${formatted}</div>`;
            container.appendChild(div);
            scrollToBottom();
            saveCurrentConversation();
        }
        
        function showTyping() {
            const container = document.getElementById('messagesContainer');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message bot';
            div.innerHTML = `<div class="message-content"><span class="typing"></span> Thinking...</div>`;
            container.appendChild(div);
            scrollToBottom();
            return id;
        }
        
        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message) return;
            
            addUserMessage(message);
            input.value = '';
            sendBtn.disabled = true;
            
            const typingId = showTyping();
            
            setTimeout(() => {
                removeTyping(typingId);
                const reply = getAIResponse(message);
                addBotMessage(reply);
                sendBtn.disabled = false;
                input.focus();
            }, 500);
        }
        
        function clearChat() {
            if (confirm('Clear all messages?')) {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                currentConversationId = Date.now();
                addBotMessage("✨ Chat cleared! I'm ready for our next conversation.");
            }
        }
        
        function toggleTheme() {
            isDark = !isDark;
            document.body.style.background = isDark ? '#1a1a2e' : '#f0f0f0';
            document.body.style.color = isDark ? '#e0e0e0' : '#333';
            document.querySelector('.header').style.background = isDark ? '#0f0f1a' : '#e0e0e0';
            document.querySelector('.input-area').style.background = isDark ? '#0f0f1a' : '#e0e0e0';
            document.querySelector('.menu-bar').style.background = isDark ? '#0f0f1a' : '#e0e0e0';
            document.getElementById('themeBtn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
            document.querySelectorAll('.message.bot .message-content').forEach(el => {
                el.style.background = isDark ? '#2a2a3a' : '#e0e0e0';
                el.style.color = isDark ? '#e0e0e0' : '#333';
            });
        }
        
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
            updateChatList();
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }
        
        // Event listeners
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('clearBtn').addEventListener('click', clearChat);
        document.getElementById('historyBtn').addEventListener('click', openSidebar);
        document.getElementById('themeBtn').addEventListener('click', toggleTheme);
        
        // Load saved chats on startup
        updateChatList();
        
        // Set status
        document.getElementById('statusText').innerHTML = "✅ 100% Offline";
        
        // Focus input
        document.getElementById('userInput').focus();
    </script>
</body>
</html>
