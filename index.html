<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OffsyncAI - Offline Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #0f0f1a;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .logo span {
            color: #7c3aed;
        }

        .status {
            font-size: 11px;
            background: #2ed57320;
            padding: 5px 10px;
            border-radius: 20px;
            color: #2ed573;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-content {
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #7c3aed;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #2a2a3a;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 16px 20px;
            background: #0f0f1a;
            border-top: 1px solid #2a2a3a;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #7c3aed;
        }

        .input-area input::placeholder {
            color: #888;
        }

        .input-area button {
            padding: 12px 20px;
            background: #7c3aed;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .menu-bar {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #0f0f1a;
            border-top: 1px solid #2a2a3a;
        }

        .menu-btn {
            flex: 1;
            padding: 8px;
            background: #2a2a3a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
        }

        .menu-btn:active {
            background: #7c3aed;
        }

        .typing {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Offsync<span>AI</span></div>
        <div class="status" id="statusText">✅ 100% Offline</div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message bot">
            <div class="message-content">I'm running 100% offline on your device. Your chats are private and never leave your phone. What else would you like to talk about?</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button id="sendBtn">Send</button>
    </div>

    <div class="menu-bar">
        <button class="menu-btn" id="historyBtn">📜 History</button>
        <button class="menu-btn" id="clearBtn">🗑️ Clear</button>
        <button class="menu-btn" id="themeBtn">🌙 Dark</button>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const themeBtn = document.getElementById('themeBtn');
        let isDark = true;

        // Expanded AI replies - marami na ngayon!
        function getAIReply(userMessage) {
            const msg = userMessage.toLowerCase().trim();
            
            // GREETINGS - Pagbati
            if (msg === 'hello' || msg === 'hi' || msg === 'hey' || msg === 'good morning' || msg === 'good afternoon' || msg === 'good evening') {
                const greetings = [
                    "❤️ Hello! How can I help you today?",
                    "❤️ Hi there! Great to chat with you!",
                    "❤️ Hey! What's on your mind?",
                    "❤️ Good day! How can I assist you?",
                    "❤️ Hello friend! Nice to see you!"
                ];
                return greetings[Math.floor(Math.random() * greetings.length)];
            }
            
            // ASKING NAME - Pangalan
            if (msg.includes('your name') || msg.includes('who are you') || msg === 'what are you') {
                return "❤️ I'm OffsyncAI! An offline AI chatbot that runs 100% on your device. No internet needed, no data leaves your phone. Your privacy is my priority!";
            }
            
            // HOW ARE YOU - Kumusta
            if (msg.includes('how are you') || msg.includes('how are u')) {
                const howReplies = [
                    "❤️ I'm doing great! Thanks for asking! How about you?",
                    "❤️ I'm fantastic! Ready to help you anytime!",
                    "❤️ I'm good, thanks! What can I do for you today?",
                    "❤️ I'm running smoothly offline! How can I help?"
                ];
                return howReplies[Math.floor(Math.random() * howReplies.length)];
            }
            
            // THANKS - Pasasalamat
            if (msg.includes('thank') || msg.includes('thanks') || msg === 'ty') {
                const thanksReplies = [
                    "❤️ You're very welcome! 😊",
                    "❤️ My pleasure! Happy to help!",
                    "❤️ Anytime! That's what I'm here for.",
                    "❤️ Glad I could help! 🙏"
                ];
                return thanksReplies[Math.floor(Math.random() * thanksReplies.length)];
            }
            
            // BYE / GOODBYE - Paalam
            if (msg.includes('bye') || msg.includes('goodbye') || msg === 'see you' || msg === 'see ya') {
                const byeReplies = [
                    "❤️ Goodbye! Come back anytime! 👋",
                    "❤️ See you later! Take care!",
                    "❤️ Bye! Have a great day! 🌟",
                    "❤️ Talk to you again soon! 👋"
                ];
                return byeReplies[Math.floor(Math.random() * byeReplies.length)];
            }
            
            // HELP - Tulong
            if (msg.includes('help') || msg === 'commands' || msg === 'what can you do') {
                return "❤️ Here's what I can do:\n\n• Answer your questions offline\n• Chat with you naturally\n• Save conversation history\n• Export chats to JSON\n• Clear chat history\n• Change themes (Dark/Light)\n\nJust type anything and I'll respond! 🚀";
            }
            
            // PRIVACY - Privacy
            if (msg.includes('privacy') || msg.includes('private') || msg.includes('data') || msg.includes('secure')) {
                return "❤️ Your privacy is my #1 priority! ✅ All chats stay ONLY on your device. ✅ No data is sent to any server. ✅ Works 100% offline. ✅ No tracking, no accounts, no sign-up. Your conversations are YOURS alone! 🔒";
            }
            
            // OFFLINE - Offline related
            if (msg.includes('offline') || msg.includes('internet') || msg.includes('wifi') || msg.includes('connection')) {
                return "❤️ Yes! I work completely OFFLINE! After you first download me, you never need internet again. Perfect for:\n\n✈️ Airplane mode\n🌴 Places with no WiFi\n💰 Saving mobile data\n🔒 Maximum privacy";
            }
            
            // WHAT IS AI / EXPLANATION
            if (msg.includes('what is ai') || msg.includes('what is artificial intelligence')) {
                return "❤️ AI (Artificial Intelligence) is technology that helps computers think and learn like humans. I'm a lightweight AI that runs directly on your phone! 🧠";
            }
            
            // JOKE - Biruan
            if (msg.includes('joke') || msg.includes('funny') || msg.includes('make me laugh')) {
                const jokes = [
                    "❤️ Why don't scientists trust atoms? Because they make up everything! 😂",
                    "❤️ What do you call a fake noodle? An impasta! 🍝",
                    "❤️ Why did the scarecrow win an award? He was outstanding in his field! 🌾",
                    "❤️ What do you call a bear with no teeth? A gummy bear! 🐻"
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }
            
            // LOVE / ROMANTIC
            if (msg.includes('love') || msg.includes('i like you') || msg.includes('crush')) {
                const loveReplies = [
                    "❤️ Aww, that's sweet! I like you too! (As a friend, I'm an AI after all) 🤖",
                    "❤️ You're awesome! Thanks for chatting with me!",
                    "❤️ I'm here for you anytime you need to talk! 💬"
                ];
                return loveReplies[Math.floor(Math.random() * loveReplies.length)];
            }
            
            // WEATHER - Panahon (with note na offline)
            if (msg.includes('weather') || msg.includes('rain') || msg.includes('sunny')) {
                return "❤️ I'd love to tell you the weather, but I work offline! To get current weather, you'd need internet. But I can chat about anything else! ☀️🌧️❄️";
            }
            
            // NEWS - Balita
            if (msg.includes('news') || msg.includes('current events')) {
                return "❤️ I'm an offline AI, so I don't have access to live news. But I can talk about general topics, answer questions, or just have a friendly chat! 📰";
            }
            
            // TIME / DATE
            if (msg.includes('what time') || msg.includes('what day') || msg.includes('today')) {
                const now = new Date();
                const timeString = now.toLocaleTimeString();
                const dateString = now.toLocaleDateString();
                return `❤️ According to your device, it's ${timeString} on ${dateString}. I get this from your phone's clock - completely offline! ⏰`;
            }
            
            // FEATURES / CAPABILITIES
            if (msg.includes('feature') || msg.includes('capabilities') || msg.includes('what can you do') && !msg.includes('help')) {
                return "❤️ My features:\n\n✅ 100% Offline Chat\n✅ Save & Export Conversations\n✅ Multiple Themes\n✅ Clear History\n✅ Private & Secure\n✅ No Accounts Needed\n✅ Free Forever!\n\nJust start typing! 🚀";
            }
            
            // COMPLIMENT - PURI
            if (msg.includes('you are') && (msg.includes('smart') || msg.includes('cool') || msg.includes('awesome') || msg.includes('good'))) {
                const compReplies = [
                    "❤️ Thank you so much! 😊 You're pretty awesome yourself!",
                    "❤️ I appreciate that! 🙏 You made my day!",
                    "❤️ Thanks! I try my best to help you! 🤖"
                ];
                return compReplies[Math.floor(Math.random() * compReplies.length)];
            }
            
            // RANDOM / FALLBACK - Default reply (gaya sa screenshot mo)
            return "❤️ Thanks for your message: \"" + userMessage + "\"\n\nI'm running 100% offline on your device. Your chats are private and never leave your phone. What else would you like to talk about?";
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message bot';
            div.innerHTML = `<div class="message-content"><span class="typing"></span> Typing...</div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';

            const typingId = showTyping();

            setTimeout(() => {
                removeTyping(typingId);
                const reply = getAIReply(message);
                addMessage(reply, false);
                saveToLocalStorage();
            }, 500);
        }

        function clearChat() {
            if (confirm('Clear all messages?')) {
                messagesContainer.innerHTML = '';
                addMessage("I'm running 100% offline on your device. Your chats are private and never leave your phone. What else would you like to talk about?", false);
                localStorage.removeItem('offsync_messages');
            }
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.style.background = isDark ? '#1a1a2e' : '#f0f0f0';
            document.body.style.color = isDark ? '#e0e0e0' : '#333';
            document.querySelector('.header').style.background = isDark ? '#0f0f1a' : '#e0e0e0';
            document.querySelector('.input-area').style.background = isDark ? '#0f0f1a' : '#e0e0e0';
            document.querySelector('.menu-bar').style.background = isDark ? '#0f0f1a' : '#e0e0e0';
            themeBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
            
            document.querySelectorAll('.message.bot .message-content').forEach(el => {
                el.style.background = isDark ? '#2a2a3a' : '#e0e0e0';
                el.style.color = isDark ? '#e0e0e0' : '#333';
            });
            document.querySelectorAll('.message.user .message-content').forEach(el => {
                el.style.background = isDark ? '#7c3aed' : '#7c3aed';
            });
        }

        function saveToLocalStorage() {
            const messages = [];
            document.querySelectorAll('.message').forEach(msg => {
                const isUser = msg.classList.contains('user');
                const content = msg.querySelector('.message-content')?.innerText;
                if (content) {
                    messages.push({ isUser, content });
                }
            });
            localStorage.setItem('offsync_messages', JSON.stringify(messages));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('offsync_messages');
            if (saved) {
                const messages = JSON.parse(saved);
                messagesContainer.innerHTML = '';
                messages.forEach(msg => {
                    addMessage(msg.content, msg.isUser);
                });
            }
        }

        // History button functionality
        document.getElementById('historyBtn').addEventListener('click', () => {
            const saved = localStorage.getItem('offsync_messages');
            if (saved) {
                const messages = JSON.parse(saved);
                if (messages.length > 0) {
                    addMessage("📜 Here's your chat history. Previous messages are still visible above!", false);
                } else {
                    addMessage("📜 No chat history found. Start a conversation first!", false);
                }
            } else {
                addMessage("📜 No chat history found. Start a conversation first!", false);
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        clearBtn.addEventListener('click', clearChat);
        themeBtn.addEventListener('click', toggleTheme);

        loadFromLocalStorage();
        userInput.focus();
    </script>
</body>
</html>
